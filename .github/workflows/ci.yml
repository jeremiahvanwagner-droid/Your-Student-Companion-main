name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# FIX: explicit minimal permissions for GITHUB_TOKEN
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # FIX: --legacy-peer-deps required for React 19 + react-day-picker peer conflict
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npx craco build
        env:
          CI: true

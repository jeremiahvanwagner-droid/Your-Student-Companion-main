# Render Blueprint — YSC FastAPI backend (Market Thirteen item #1)
# Deploy: Render Dashboard → New → Blueprint → point at this repo.
# Secrets are sync:false — Render prompts for them on first deploy;
# values come from the secret inventory in docs/runbooks/backend-deploy.md.

services:
  - type: web
    name: ysc-backend
    runtime: docker
    repo: https://github.com/jeremiahvanwagner-droid/Your-Student-Companion-main
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    region: ohio
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: AI_DAILY_TOKEN_BUDGET
        value: "50000"
      - key: CORS_ALLOWED_ORIGINS
        value: https://ysc.growthbychoice.com,https://your-student-companion-main.vercel.app
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: REACT_APP_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_ISSUER
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
